<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Campus Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      margin: 0;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
    }
    button {
      padding: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Smart Campus Pro</h1>

  <!-- LOGIN -->
  <div id="authBox" class="card">
    <input id="emailInput" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">

    <!-- ATTENDANCE -->
    <div class="card">
      <h3>QR + GPS Attendance</h3>
      <button onclick="markAttendance()">Mark Attendance</button>
    </div>

    <!-- NOTICE -->
    <div class="card">
      <h3>Notices</h3>
      <input id="noticeInput" placeholder="Write notice">
      <button onclick="addNotice()">Upload</button>
      <ul id="noticeList"></ul>
    </div>

    <!-- ASSIGNMENTS -->
    <div class="card">
      <h3>Assignments</h3>
      <input id="assignmentInput" placeholder="Add assignment">
      <button onclick="addAssignment()">Upload</button>
      <ul id="assignmentList"></ul>
    </div>

    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

  import { 
    getAuth, createUserWithEmailAndPassword, 
    signInWithEmailAndPassword, onAuthStateChanged, signOut 
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  import { 
    getFirestore, collection, addDoc, onSnapshot 
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC6tXiwvY68BKYxP6Nw-vgpGBoZKF7c5Fg",
    authDomain: "smart-campus-863c3.firebaseapp.com",
    projectId: "smart-campus-863c3",
    storageBucket: "smart-campus-863c3.firebasestorage.app",
    messagingSenderId: "760023984428",
    appId: "1:760023984428:web:5e2bb4b2b503bf4237e489"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // SIGNUP
  window.signup = async () => {
    await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    alert("Signup successful");
  };

  // LOGIN
  window.login = async () => {
    await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
  };

  // LOGOUT
  window.logout = () => signOut(auth);

  // USER STATE
  onAuthStateChanged(auth, user => {
    if (user) {
      authBox.style.display = "none";
      dashboard.style.display = "block";
      loadNotices();
      loadAssignments();
    }
  });

  // GPS + QR ATTENDANCE
  window.markAttendance = () => {
    navigator.geolocation.getCurrentPosition(async (pos) => {

      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      const collegeLat = 11.0168; // CHANGE THIS
      const collegeLon = 76.9558; // CHANGE THIS

      const distance = Math.sqrt((lat - collegeLat)**2 + (lon - collegeLon)**2);

      if (distance < 0.01) {
        const qr = prompt("Enter QR Code:");

        if (qr === "SMART123") {
          await addDoc(collection(db, "attendance"), {
            user: auth.currentUser.email,
            time: new Date()
          });
          alert("Attendance Marked ✅");
        } else {
          alert("Wrong QR ❌");
        }

      } else {
        alert("You are not in campus ❌");
      }
    });
  };

  // ADD NOTICE
  window.addNotice = async () => {
    await addDoc(collection(db, "notices"), {
      text: noticeInput.value
    });
    noticeInput.value = "";
  };

  // LOAD NOTICES
  function loadNotices() {
    onSnapshot(collection(db, "notices"), snap => {
      noticeList.innerHTML = "";
      snap.forEach(doc => {
        const li = document.createElement("li");
        li.innerText = doc.data().text;
        noticeList.appendChild(li);
      });
    });
  }

  // ADD ASSIGNMENT
  window.addAssignment = async () => {
    await addDoc(collection(db, "assignments"), {
      text: assignmentInput.value
    });
    assignmentInput.value = "";
  };

  // LOAD ASSIGNMENTS
  function loadAssignments() {
    onSnapshot(collection(db, "assignments"), snap => {
      assignmentList.innerHTML = "";
      snap.forEach(doc => {
        const li = document.createElement("li");
        li.innerText = doc.data().text;
        assignmentList.appendChild(li);
      });
    });
  }

</script>

</body>
</html>
